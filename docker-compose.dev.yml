services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    volumes:
      - ./server:/app
      - api_node_modules:/app/node_modules
    environment:
      NODE_ENV: development

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    ports: !override
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://api:3001
      CHOKIDAR_USEPOLLING: "true"

volumes:
  api_node_modules:
  client_node_modules:
